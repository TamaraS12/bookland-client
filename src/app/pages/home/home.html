<header class="app-header">
  <div class="left">
    <span class="logo">BookLand</span>
  </div>

  <div class="right">

    <p-overlaybadge [value]="cartSize()" badgeSize="small" (click)="handleViewCart()">
      <i class="pi pi-shopping-cart" style="font-size: 1.5rem; cursor: pointer;"></i>
    </p-overlaybadge>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <p-menu [model]="items"></p-menu>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
