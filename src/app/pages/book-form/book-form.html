<div class="book-form-container">
  <p-card>
    <div class="form-header">
      <h2 class="text-2xl">
        {{ isEditMode ? 'Edit Book' : 'Add Book' }}
      </h2>
    </div>

    <div class="form-grid" [formGroup]="form">

      <div class="field">
        <label for="title">Title</label>

        <input
          id="title"
          pInputText
          formControlName="title"
          class="w-full">
      </div>

      <div class="field">
        <label>Author</label>

        <p-select
          [options]="authors()"
          optionLabel="name"
          optionValue="id"
          formControlName="authorId"
          placeholder="Select author">
        </p-select>
      </div>

      <div class="field">
        <label>Genres</label>

        <p-multiselect
          [options]="genres()"
          optionLabel="name"
          optionValue="id"
          formControlName="genreIds"
          placeholder="Select genres"
          display="chip">
        </p-multiselect>
      </div>

      <div class="field">
        <label>Price (RSD)</label>

        <p-inputNumber
          formControlName="price"
          mode="decimal"
          [min]="0">
        </p-inputNumber>
      </div>

      <div class="field field-full">
        <p-fileupload
          mode="basic"
          chooseLabel="Choose Image"
          accept="image/*"
          [auto]="false"
          [customUpload]="true"
          (onSelect)="onFileSelect($event)">
        </p-fileupload>
      </div>

      @if (imagePreview()) {
        <div class="field field-full">
          <img
            [src]="imagePreview()"
            alt="Book image"
            height="180"
            width="120"
            class="preview-image">
        </div>
      }

      <div class="field field-full">
        <label>Description</label>

        <textarea
          pTextarea
          rows="6"
          formControlName="description"
          class="w-full">
      </textarea>
      </div>

    </div>

    <div class="form-actions">

      <p-button
        label="Cancel"
        icon="pi pi-times"
        severity="secondary"
        (onClick)="cancel()">
      </p-button>

      <p-button
        label="Save"
        icon="pi pi-save"
        (onClick)="save()">
      </p-button>

    </div>
  </p-card>
</div>
