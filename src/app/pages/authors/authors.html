<p-confirmdialog />
<div class="authors-header">
  <h2>Authors</h2>

  <p-button
    label="Add Author"
    icon="pi pi-plus"
    (click)="addAuthor()">
  </p-button>
</div>

<div class="authors-grid">
  @for (author of authors(); track $index) {
    <p-card class="author-card">

      <div class="author-avatar">
        <p-avatar
          [label]="getInitials(author.name)"
          shape="circle"
          size="large">
        </p-avatar>
      </div>

      <div class="author-name">
        {{ author.name }}
      </div>

      <div class="author-actions">

        <p-button
                icon="pi pi-pencil"
                (click)="editAuthor(author)">
        </p-button>

        <p-button
                icon="pi pi-trash"
                severity="danger"
                (click)="deleteAuthor(author.id)">
        </p-button>
      </div>

    </p-card>
  }

</div>
