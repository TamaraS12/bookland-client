<div class="order-form-container">

  <div class="form-header">
    <h2 class="text-3xl mb-5">Create Order</h2>
  </div>

  <div class="form-grid" [formGroup]="form">

    <div class="image-container">
      <img
        [src]="'/order.jpg'"
        alt="Order image"
        class="preview-image">
    </div>

    <div class="form-fields">

      <div class="field">
        <label for="country">Country</label>

        <input
          id="country"
          pInputText
          formControlName="country"
          class="w-full">
      </div>

      <div class="field">
        <label for="city">City</label>

        <input
          id="city"
          pInputText
          formControlName="city"
          class="w-full">
      </div>

      <div class="field">
        <label for="address">Address</label>

        <input
          id="address"
          pInputText
          formControlName="address"
          class="w-full">
      </div>

    </div>

  </div>

  <div class="form-actions">

    <p-button
      label="Save"
      icon="pi pi-save"
      (onClick)="save()">
    </p-button>

    <p-button
      label="Cancel"
      icon="pi pi-times"
      severity="secondary"
      (onClick)="cancel()">
    </p-button>

  </div>

</div>
