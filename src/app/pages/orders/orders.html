<div class="orders-container">
  <p-card>
    <h2 class="text-2xl mb-5">Orders</h2>
    <p-table
      [value]="orders()"
      [paginator]="true"
      [rows]="8"
      dataKey="id">

      <ng-template #header>
        <tr>
          <th style="width: 5rem"></th>
          <th>Country</th>
          <th>City</th>
          <th>Address</th>
          <th>Order Date</th>
          <th>Total Amount</th>
        </tr>
      </ng-template>

      <ng-template #body let-order let-expanded="expanded">
        <tr>
          <td>
            <p-button
              type="button"
              pRipple
              [pRowToggler]="order"
              [text]="true"
              [rounded]="true"
              [plain]="true"
              [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'">
            </p-button>
          </td>

          <td>{{ order.country }}</td>
          <td>{{ order.city }}</td>
          <td>{{ order.address }}</td>
          <td>{{ order.orderDate | date:'dd.MM.yyyy' }}</td>
          <td>{{ order.totalAmount | number:'1.2-2' }} RSD</td>
        </tr>
      </ng-template>

      <ng-template #expandedrow let-order>
        <tr>
          <td colspan="6">
            <div class="p-3">

              <p-table
                [value]="order.items"
                dataKey="id">

                <ng-template pTemplate="header">
                  <tr>
                    <th>Book</th>
                    <th>Quantity</th>
                    <th>Amount</th>
                  </tr>
                </ng-template>

                <ng-template #body let-item>
                  <tr>
                    <td>{{ item.bookTitle }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>{{ item.amount | number:'1.2-2' }} RSD</td>
                  </tr>
                </ng-template>

              </p-table>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>
  </p-card>
</div>
