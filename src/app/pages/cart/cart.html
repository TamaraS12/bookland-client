<p-confirmdialog />
<div class="cart-container">
  <p-card>
    <h2 class="text-3xl mb-5">Shopping Cart</h2>

    @if (cart().items.length > 0) {

      <p-table
        [value]="cart().items"
        responsiveLayout="scroll">

        <ng-template pTemplate="header">
          <tr>
            <th>Book</th>
            <th>Title</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
          <tr>
            <td>
              <img
                [src]="apiBaseUrl + item.book.imageName"
                [alt]="item.book.title"
                class="cart-image"
              />
            </td>

            <td>
              {{ item.book.title }}
            </td>

            <td>
              {{ item.book.price | number:'1.2-2' }} RSD
            </td>

            <td>
              {{ item.quantity }}
            </td>

            <td>
              {{ item.amount | number:'1.2-2' }} RSD
            </td>

            <td>
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                (onClick)="handleDelete(item)">
              </p-button>
            </td>
          </tr>
        </ng-template>

      </p-table>

      <div class="cart-summary">
        <div class="total">
          Total:
          <span>
          {{ totalAmount() | number:'1.2-2' }} RSD
        </span>
        </div>

        <div class="actions">
          <p-button
            label="Clear Cart"
            severity="secondary"
            (onClick)="clearCart()">
          </p-button>

          <p-button
            (click)="handleOrder()"
            label="Checkout"
            icon="pi pi-credit-card">
          </p-button>
        </div>
      </div>

    } @else {

      <div class="empty-cart">
        <i class="pi pi-shopping-cart text-5xl"></i>
        <h3>Your cart is empty</h3>
      </div>

    }
  </p-card>
</div>
