<div class="shop-container">
  <p-card class="mb-3">
  <h2 class="text-2xl mb-5">Shop</h2>

  <div class="search-section">
    <input
      pInputText
      type="text"
      placeholder="Search by title"
      [(ngModel)]="filters.title"
      (input)="loadBooks()"
      class="w-full">
  </div>

  <div class="filters-section">

    <p-select
      [options]="sortOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Sort"
      (onChange)="handleSortChange($event)">
    </p-select>

    <p-select
      [options]="authors()"
      [(ngModel)]="filters.authorId"
      optionLabel="name"
      optionValue="id"
      placeholder="Author"
      (onChange)="loadBooks()">
    </p-select>

    <p-select
      [options]="genres()"
      [(ngModel)]="filters.genreId"
      optionLabel="name"
      optionValue="id"
      placeholder="Genre"
      (onChange)="loadBooks()">
    </p-select>

    <p-button
      label="Reset"
      icon="pi pi-filter-slash"
      severity="secondary"
      (onClick)="resetFilters()">
    </p-button>

  </div>

  </p-card>

  <p-dataview #dv [value]="bookSearchResponse().content"
              [layout]="'grid'"
              [rows]=bookSearchResponse().size
              [paginator]="true"
              [lazy]="true"
              [totalRecords]="bookSearchResponse().totalElements"
              (onLazyLoad)="handleLoad($event)">
    <ng-template #grid let-items>
      <div class="grid grid-cols-12 book-cards-container">
        @for (book of items; track $index) {
          <div class="col-span-12 sm:col-span-6 md:col-span-4 xl:col-span-6 p-2">
            <p-card class="shop-card h-[365px] w-[250px]">
              <div class="bg-surface-50 flex justify-center rounded">
                <div class="relative mx-auto">
                  <img class="mx-auto rounded w-50 h-50" [src]="apiBaseUrl + book.imageName" [alt]="book.title" />
                </div>
              </div>
              <div class="pt-2">
                <div class="flex flex-row justify-between products-start gap-2">
                  <div>
                      <span
                        class="font-normal text-surface-500 dark:text-surface-400 text-xs text-500">{{ book.authorName }}</span>
                    <div class="text-sm font-medium mt-1 book-title">{{ book.title }}</div>
                  </div>
                </div>
                <div class="flex flex-col gap-2 mt-auto">
                  <span class="text-l font-semibold">{{ book.price | number:'1.2-2' }} {{ 'RSD' }}</span>
                  <p-button
                    icon="pi pi-shopping-cart"
                    label="Buy Now"
                    styleClass="w-full h-8" (click)="handleBookDetails(book)"></p-button>
                </div>
              </div>
            </p-card>
          </div>
        }

      </div>
    </ng-template>
  </p-dataview>
</div>
